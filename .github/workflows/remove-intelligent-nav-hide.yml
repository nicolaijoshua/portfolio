name: Remove intelligent case mobile nav hide

on:
  push:
    paths:
      - .github/workflows/remove-intelligent-nav-hide.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove hidden print shop rule
        run: |
          sed -i '/\.nav-right a:not(:last-child) { display: none; }/d' case-intelligent-charging.html
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/remove-intelligent-nav-hide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add case-intelligent-charging.html .github/workflows/remove-intelligent-nav-hide.yml
          git commit -m "Restore print shop link on intelligent charging mobile nav"
          git push
