name: Bump theme script cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bump-theme-cache.yml'

permissions:
  contents: write

jobs:
  bump-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update theme script version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const files = ['index.html', 'case-intelligent-charging.html', 'case-route-planning.html'];
          for (const file of files) {
            const html = fs.readFileSync(file, 'utf8').replaceAll('assets/js/theme.js?v=20260611', 'assets/js/theme.js?v=20260611-2');
            fs.writeFileSync(file, html);
          }
          fs.rmSync('.github/workflows/bump-theme-cache.yml', { force: true });
          NODE
      - name: Commit cache bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html case-intelligent-charging.html case-route-planning.html .github/workflows/bump-theme-cache.yml
          git commit -m "Bump theme script cache version"
          git push
