name: Fix iOS status bar theme

on:
  push:
    paths:
      - .github/workflows/fix-ios-theme-color-lock.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch HTML heads
        run: |
          for f in index.html case-intelligent-charging.html case-route-planning.html; do
            sed -i 's/content="width=device-width, initial-scale=1.0"/content="width=device-width, initial-scale=1.0, viewport-fit=cover"/' "$f"
            sed -i '/<meta name="theme-color"/d' "$f"
            sed -i 's/assets\/js\/theme.js?v=20260611-[0-9]*/assets\/js\/theme.js?v=20260611-3/g' "$f"
          done
      - name: Replace shared theme script
        run: |
          cat > assets/js/theme.js <<'JS'
          (function () {
            const LIGHT_THEME_COLOR = '#f0f2f5';
            const DARK_THEME_COLOR = '#141414';
            const STORAGE_KEY = 'theme';

            function getSavedTheme() {
              try {
                const savedTheme = localStorage.getItem(STORAGE_KEY);
                return savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : null;
              } catch (error) {
                return null;
              }
            }

            function getActiveTheme() {
              const body = document.body;
              const root = document.documentElement;

              if (
                (body && body.classList.contains('dark')) ||
                root.classList.contains('dark') ||
                (body && body.dataset.theme === 'dark') ||
                root.dataset.theme === 'dark'
              ) {
                return 'dark';
              }

              if (
                (body && body.dataset.theme === 'light') ||
                root.dataset.theme === 'light'
              ) {
                return 'light';
              }

              return null;
            }

            function getPreferredTheme() {
              return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function getInitialTheme() {
              return getSavedTheme() || getActiveTheme() || getPreferredTheme();
            }

            function getThemeColor(theme) {
              return theme === 'dark' ? DARK_THEME_COLOR : LIGHT_THEME_COLOR;
            }

            function getStatusBarStyle(theme) {
              return theme === 'dark' ? 'black-translucent' : 'default';
            }

            function insertEarly(meta) {
              if (document.currentScript && document.currentScript.parentNode) {
                document.currentScript.parentNode.insertBefore(meta, document.currentScript.nextSibling);
              } else if (document.head.firstChild) {
                document.head.insertBefore(meta, document.head.firstChild);
              } else {
                document.head.appendChild(meta);
              }
            }

            function ensureMeta(name, selector) {
              let meta = document.querySelector(selector || 'meta[name="' + name + '"]');
              if (!meta) {
                meta = document.createElement('meta');
                meta.setAttribute('name', name);
                insertEarly(meta);
              }
              return meta;
            }

            function setColorScheme(theme) {
              document.documentElement.style.colorScheme = theme;
              const meta = ensureMeta('color-scheme', 'meta[name="color-scheme"]');
              meta.setAttribute('content', theme);
            }

            function setAppleStatusBar(theme) {
              const meta = ensureMeta('apple-mobile-web-app-status-bar-style', 'meta[name="apple-mobile-web-app-status-bar-style"]');
              meta.setAttribute('content', getStatusBarStyle(theme));
            }

            function getThemeColorMeta() {
              let meta = document.querySelector('meta[name="theme-color"][data-theme-color-active]');
              if (meta) {
                return meta;
              }

              meta = document.querySelector('meta[name="theme-color"]');
              if (!meta) {
                meta = document.createElement('meta');
                meta.setAttribute('name', 'theme-color');
                insertEarly(meta);
              }

              meta.setAttribute('data-theme-color-active', '');
              meta.removeAttribute('media');
              return meta;
            }

            function setThemeColor(theme) {
              const color = getThemeColor(theme);
              const meta = getThemeColorMeta();

              meta.removeAttribute('media');
              meta.setAttribute('content', color);
              meta.content = color;

              requestAnimationFrame(function () {
                meta.setAttribute('content', color);
                meta.content = color;
              });

              setTimeout(function () {
                meta.setAttribute('content', color);
                meta.content = color;
              }, 120);
            }

            function setToggleIcon(theme) {
              const icon = document.getElementById('toggleIcon');
              if (icon) {
                icon.textContent = theme === 'dark' ? '\uD83C\uDF19' : '\u2600\uFE0F';
              }
            }

            function setRootTheme(theme) {
              document.documentElement.classList.toggle('dark', theme === 'dark');
            }

            function applyTheme(theme, shouldSave) {
              setRootTheme(theme);

              if (document.body) {
                document.body.classList.toggle('dark', theme === 'dark');
              }

              setToggleIcon(theme);
              setColorScheme(theme);
              setAppleStatusBar(theme);
              setThemeColor(theme);

              if (shouldSave) {
                try {
                  localStorage.setItem(STORAGE_KEY, theme);
                } catch (error) {
                  // Ignore storage failures so the theme toggle still works.
                }
              }
            }

            applyTheme(getInitialTheme(), false);

            function initTheme() {
              const toggle = document.getElementById('themeToggle');

              applyTheme(getInitialTheme(), false);

              if (toggle) {
                toggle.addEventListener('click', function () {
                  const nextTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
                  applyTheme(nextTheme, true);
                });
              }
            }

            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', initTheme);
            } else {
              initTheme();
            }
          }());
          JS
          sed -i 's/^          //' assets/js/theme.js
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/fix-ios-theme-color-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html case-intelligent-charging.html case-route-planning.html assets/js/theme.js .github/workflows/fix-ios-theme-color-lock.yml
          git commit -m "Fix iOS Safari status bar theme switching"
          git push
