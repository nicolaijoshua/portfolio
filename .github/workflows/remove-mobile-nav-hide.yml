name: Remove mobile nav hide

on:
  push:
    paths:
      - .github/workflows/remove-mobile-nav-hide.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch theme script version and case nav
        run: |
          for f in index.html case-intelligent-charging.html case-route-planning.html; do
            sed -i 's/assets\/js\/theme.js?v=20260611-5/assets\/js\/theme.js?v=20260611-6/g' "$f"
          done
          sed -i 's/    .nav-right a:not(:last-child) { display: none; }\n//' case-intelligent-charging.html
          sed -i 's/ .nav-right a:not(:last-child) { display: none; }//' case-route-planning.html
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/remove-mobile-nav-hide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html case-intelligent-charging.html case-route-planning.html .github/workflows/remove-mobile-nav-hide.yml
          git commit -m "Restore mobile case nav and bump theme cache"
          git push
