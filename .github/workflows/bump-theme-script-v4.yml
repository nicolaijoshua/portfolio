name: Bump theme script v4

on:
  push:
    paths:
      - .github/workflows/bump-theme-script-v4.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump theme script version
        run: |
          for f in index.html case-intelligent-charging.html case-route-planning.html; do
            sed -i 's/assets\/js\/theme.js?v=20260611-3/assets\/js\/theme.js?v=20260611-4/g' "$f"
          done
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/bump-theme-script-v4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html case-intelligent-charging.html case-route-planning.html .github/workflows/bump-theme-script-v4.yml
          git commit -m "Bump theme script cache for iOS refresh fix"
          git push
